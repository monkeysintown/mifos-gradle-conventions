services:
  localstack:
    container_name: localstack
    # image: localstack/localstack:4.0.3
    image: localstack/localstack:3.8.1
    ports:
      - "18080:8080"
      - "4566:4566"
    env_file:
      - ../env/localstack.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
