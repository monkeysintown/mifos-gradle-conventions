        implementation(platform("au.gov.amsa.risky:risky-bom:0.6.19")) {
            exclude group: "junit", module: "junit"
        }

        constraints {
            implementation "org.locationtech.jts:jts-io:1.20.0"
            implementation "org.locationtech.jts.io:jts-io-common:1.20.0"
            implementation "org.locationtech.jts:jts-core:1.20.0"
            implementation "org.locationtech.jts:jts-modules:1.20.0"
            implementation "org.locationtech.spatial4j:spatial4j:0.8"

            implementation "org.geotools:gt-mongodb:31.0"
            implementation "org.geotools:gt-complex:31.0"
            implementation "org.geotools:gt-swing:31.0"
            implementation "org.geotools:gt-main:31.0"
            implementation "org.geotools:gt-shapefile:31.0"
            implementation "org.geotools:gt-referencing:31.0"
            implementation "org.geotools:gt-opengis:31.0"
            implementation "org.geotools:gt-geojson:31.0"
            implementation "org.geotools:gt-cql:31.0"
            implementation "org.geotools:gt-coverage:31.0"
            implementation "org.geotools:gt-api:31.0"
            implementation "org.geotools:gt-data:31.0"
            implementation "org.geotools:gt-metadata:31.0"
            implementation "org.geotools:gt-render:31.0"
            implementation "org.geotools:gt-tile-client:31.0"
            implementation "org.geotools:gt-epsg-hsql:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-postgis:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-h2:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-oracle:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-sqlserver:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-mysql:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-teradata:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-db2:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-informix:31.0"
            implementation "org.geotools.jdbc:gt-jdbc-h2gis:31.0"
