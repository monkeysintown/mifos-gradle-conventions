            implementation "com.graphhopper:graphhopper-web:10.0"
            implementation "com.graphhopper:graphhopper-web-api:10.0"
            implementation "com.graphhopper:graphhopper-reader-gtfs:10.0"
            implementation "com.graphhopper:graphhopper-reader-json:0.10.3"
            implementation "com.graphhopper:graphhopper-reader-overlay-data:0.8.2"
            implementation "com.graphhopper:graphhopper-reader-osm:3.0-pre3"
            implementation "com.graphhopper:graphhopper-reader-shp:0.12.0-pre1"
            implementation "com.graphhopper:graphhopper-tools:10.0"
