repositories {
    maven {
        url = "https://repo.spring.io/snapshot"
    }

    configurations.all {
        exclude group: "commons-logging", module: "commons-logging"
        exclude group: "org.apache.logging.log4j", module: "log4j-slf4j2-impl"
    }

    dependencies {
        implementation platform("org.springframework:spring-framework-bom:7.0.7")

        implementation platform("org.springframework.boot:spring-boot-dependencies:4.0.7")

        implementation platform("org.springframework.shell:spring-shell-dependencies:4.0.2")

        implementation platform("org.springframework.security:spring-security-bom:7.0.5")

        implementation platform("org.springframework.data:spring-data-bom:2026.0.0-RC1")

        implementation platform("org.springframework.grpc:spring-grpc-build-dependencies:1.1.0-RC1")

        implementation platform("io.awspring.cloud:spring-cloud-aws-dependencies:4.0.2")

        implementation platform("org.springframework.cloud:spring-cloud-dependencies:2025.1.1") {
            exclude group: "org.eclipse.jgit", module: "org.eclipse.jgit"
        }

        implementation platform("org.springframework.restdocs:spring-restdocs-bom:4.0.0")

        implementation platform("org.springdoc:springdoc-openapi-bom:3.0.3")

        implementation platform("io.rsocket:rsocket-bom:1.1.5")

        implementation platform("io.projectreactor:reactor-bom:2025.0.5")

        implementation platform("io.github.resilience4j:resilience4j-bom:2.4.0")

        constraints {
            developmentOnly "org.springframework.boot:spring-boot-devtools:4.0.6"

            implementation "org.springframework.graphql:spring-graphql:2.0.3"

            implementation "de.codecentric:spring-boot-admin-server:3.4.1"
            implementation "de.codecentric:spring-boot-admin-server-ui:3.4.1"
            implementation "de.codecentric:spring-boot-admin-server-ui-login:3.4.1"

            implementation "io.projectreactor.tools:blockhound:1.0.16.RELEASE"
            implementation "io.projectreactor.tools:blockhound-junit-platform:1.0.16.RELEASE"

            implementation "io.github.springwolf:springwolf-ui:2.2.0"
            implementation "io.github.springwolf:springwolf-kafka:2.2.0"
            implementation "io.github.springwolf:springwolf-amqp:2.2.0"
            implementation "io.github.springwolf:springwolf-cloud-stream:2.2.0"
            implementation "io.github.springwolf:springwolf-sns:2.2.0"
            implementation "io.github.springwolf:springwolf-sqs:2.2.0"
            implementation "io.github.springwolf:springwolf-jms:2.2.0"
            implementation "io.github.springwolf:springwolf-common-model-converters:2.2.0"
            implementation "io.github.springwolf:springwolf-json-schema:2.2.0"
            implementation "io.github.springwolf:springwolf-generic-binding:2.2.0"
            implementation "io.github.springwolf:springwolf-amqp-binding:2.2.0"
            implementation "io.github.springwolf:springwolf-googlepubsub-binding:2.2.0"
            implementation "io.github.springwolf:springwolf-core:2.2.0"
            implementation "io.github.springwolf:springwolf-asyncapi:2.2.0"
        }
    }
}
