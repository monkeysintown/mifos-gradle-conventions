        implementation "org.apache.cxf.xjc.plugins:cxf-xjc-boolean:4.1.0"
        implementation "org.apache.cxf.xjc.plugins:cxf-xjc-ts:4.1.0"
        implementation "org.apache.cxf.xjc.plugins:cxf-xjc-dv:4.1.0"
        implementation "org.apache.cxf.xjc.plugins:cxf-xjc-boolean-test:4.1.0"
