dependencies {
    constraints {
        modules {
            module("junit:junit") {
                replacedBy("org.junit.vintage:junit-vintage-engine", "Use JUnit 5!")
            }
            module("com.google.guava:listenablefuture") {
                replacedBy("com.google.guava:guava", "listenablefuture is part of guava")
            }
            module("com.google.collections:google-collections") {
                replacedBy("com.google.guava:guava", "google-collections is part of guava")
            }
            module("org.springframework.boot:spring-boot-starter-tomcat") {
                replacedBy("org.springframework.boot:spring-boot-starter-jetty", "Use Jetty instead of Tomcat")
            }
            // module("org.springframework.boot:spring-boot-starter-logging") {
            //     replacedBy("org.springframework.boot:spring-boot-starter-log4j2", "Use Log4j2 instead of Logback")
