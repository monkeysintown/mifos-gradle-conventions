sonarLint {
    isGeneratedCodeIgnored = true // `true` by default, set to `false` to validate generated code (code inside `./build/`)

    // Build fails only on issues at or above this severity. Allowed: 'ERROR', 'WARNING', 'INFO'.
    // When unset (default), every issue fails the build.
    // All issues are still logged and written to XML/HTML reports regardless of this setting.
    failOnSeverity("WARNING")

    rules {
        rule("java:S1190") {
            property("format", '^[a-z_][a-zA-Z0-9]*$') // Configure `format` property for `java:S100` rule
        }
    }

    languages {
        include("java") // Enable Java and Kotlin languages only, all other languages become disabled

        includeInfra = true // Include infra languages (like CloudFormation) that are excluded by default
        includeFrontend = false // Include frontend languages (like JavaScript) that are excluded by default
    }

    // ignoredPaths.add('**/dto/**') // Ignore all files which relative path matches `**/dto/**` glob for all rules
    ignoredPaths.add("**/org/mifos/*/sdk/*")

    // Which source sets contain test sources.
    // Source sets created by plugins like `jvm-test-suite`, `java-test-fixtures`, or `name.remal.test-source-sets` are automatically handled.
    // Most likely, you don't have to configure anything yourself.
    testSourceSets = sourceSets.matching { true }

    logging {
        withDescription = false // Hide rule descriptions from console output
    }
}

checkerFramework {
    version = "4.2.0"
    skipCheckerFramework = true // TODO: enable again, when clear how to use
    excludeTests = true
    // incrementalize = false
    checkers = [
        "org.checkerframework.checker.index.IndexChecker",
        "org.checkerframework.checker.nullness.NullnessChecker",
        "org.checkerframework.checker.resourceleak.ResourceLeakChecker",
        "org.checkerframework.checker.lock.LockChecker",
        "org.checkerframework.checker.units.UnitsChecker",
    ]
}

