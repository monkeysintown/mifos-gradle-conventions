// checkstyle

checkstyle {
    toolVersion = "$checkstyleVersion"
    configFile = file("${rootDir}/.mifos/config/checkstyle/checkstyle.xml")
    configDirectory = file("${rootDir}/.mifos/config/checkstyle")
    configProperties = [
        "checkstyleSuppressionsPath": file("${rootDir}/.mifos/config/checkstyle/suppressions.xml").absolutePath,
    ]
}

checkstyleMain.exclude "**/bin/**"
checkstyleMain.exclude "**/out/**"
checkstyleMain.exclude "**/build/**"
checkstyleMain.exclude "**/target/**"

checkstyleTest.exclude "**/bin/**"
checkstyleTest.exclude "**/out/**"
checkstyleTest.exclude "**/build/**"
checkstyleTest.exclude "**/target/**"

tasks.withType(Checkstyle) {
    exclude "**/bin/**"
    exclude "**/out/**"
    exclude "**/build/**"
    exclude "**/target/**"
    reports {
        sarif.required = true
    }
}

