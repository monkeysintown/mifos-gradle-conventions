plugins {
    id "java"
    id "pmd"
    id "checkstyle"
    id "org.owasp.dependencycheck"
    id "com.autonomousapps.dependency-analysis"
    id "org.sonarqube"
    id "com.github.spotbugs"
    id "com.diffplug.spotless"
    id "net.ltgt.errorprone"
    id "de.kontext-e.jqassistant.gradle"
    id "name.remal.sonarlint"
    id "org.checkerframework"
    id "org.openrewrite.rewrite"
    id "org.jetbrains.qodana"
    id "com.cmgapps.licenses"
    // id "io.snyk.gradle.plugin.snykplugin"
    // id "com.palantir.java-format-spotless"
}

ext["checkstyleVersion"] = "13.8.0"

tasks.withType(JavaCompile).configureEach {
    options.errorprone {
        enabled = project.gradle.startParameter.taskNames.contains('build') || project.gradle.startParameter.taskNames.contains('check')
        disableWarningsInGeneratedCode = true
        allErrorsAsWarnings = true
        excludedPaths = ".*/build/.*"
        option(
            "NullAway:AnnotatedPackages", "com.uber"
        )
        disable(
            // TODO Remove disabled checks from this list, by fixing remaining usages
            "UnusedVariable",
            "TypeParameterUnusedInFormals",
            "EmptyBlockTag",
            "MissingSummary",
            "InvalidParam",
            "ReturnFromVoid",
            "AlmostJavadoc",
            "InvalidBlockTag",
            "JavaUtilDate",
            "ReturnValueIgnored",
            "DirectInvocationOnMock",
            "CanIgnoreReturnValueSuggester",
            "SameNameButDifferent", // Until errorprone recognizes Lombok
            "MultiVariableDeclaration", // Until errorprone recognizes Lombok
            "UnnecessaryDefaultInEnumSwitch"
        )
        warn(
            "NullAway",
            "DefaultCharset",
            "RemoveUnusedImports",
            "WaitNotInLoop",
            "ThreeLetterTimeZoneID",
            "VariableNameSameAsType",
            "UnnecessaryParentheses",
            "MultipleTopLevelClasses",
            "MixedMutabilityReturnType",
            "AssertEqualsArgumentOrderChecker",
            "EmptySetMultibindingContributions",
            "BigDecimalEquals",
            "MixedArrayDimensions",
            "PackageLocation",
            "UseBinds",
            "BadImport",
            "IntLongMath",
            "FloatCast",
            "ReachabilityFenceUsage",
            "StreamResourceLeak",
            "TruthIncompatibleType",
            "ByteBufferBackingArray",
            "OrphanedFormatString",
            "CatchAndPrintStackTrace",
            "ObjectToString",
            "StringSplitter",
            "AssertThrowsMultipleStatements",
            "BoxedPrimitiveConstructor",
            "EmptyCatch",
            "BoxedPrimitiveEquality",
            "SynchronizeOnNonFinalField",
            "WildcardImport",
            "FutureReturnValueIgnored",
            "PrivateConstructorForNoninstantiableModule",
            "ClassCanBeStatic",
            "ClassNewInstance",
            "UnnecessaryStaticImport",
            "UnsafeFinalization",
            "JavaTimeDefaultTimeZone",
            "JodaPlusMinusLong",
            "SwitchDefault",
            "VarTypeName",
            "ArgumentSelectionDefectChecker",
            "CompareToZero",
            "InjectOnConstructorOfAbstractClass",
            "ImmutableEnumChecker",
            "NarrowingCompoundAssignment",
            "MissingCasesInEnumSwitch",
            "ReferenceEquality",
            "UndefinedEquals",
            "UnescapedEntity",
            "ModifyCollectionInEnhancedForLoop",
            "NonCanonicalType",
            "InvalidInlineTag",
            "MutablePublicArray",
            "StaticAssignmentInConstructor",
            "ProtectedMembersInFinalClass",
            "OperatorPrecedence",
            "EqualsGetClass",
            "EqualsUnsafeCast",
            "DoubleBraceInitialization",
            "UnusedNestedClass",
            "UnusedMethod",
            "ModifiedButNotUsed",
            "InconsistentCapitalization",
            "MissingOverride",
            "InvalidBlockTag",
            "InconsistentOverloads",
            "MethodCanBeStatic",
            "Var",
            "ConstantField",
            "UnnecessaryDefaultInEnumSwitch",
            "FieldCanBeFinal"
        )
    }
}

dependencies {
    spotbugsPlugins "jp.skypencil.findbugs.slf4j:bug-pattern:1.5.0@jar"
    spotbugsPlugins "com.h3xstream.findsecbugs:findsecbugs-plugin:1.14.0"
    spotbugsPlugins "com.mebigfatguy.sb-contrib:sb-contrib:7.7.4"
    // spotbugsPlugins "de.heidelberg.pvs.diego:1.0-SNAPSHOT"

    errorprone "com.uber.nullaway:nullaway:0.13.8"
    errorprone "com.google.errorprone:error_prone_core:2.50.0"
    errorprone "jp.skypencil.errorprone.slf4j:errorprone-slf4j:0.1.29"

    rewrite platform("org.openrewrite.recipe:rewrite-recipe-bom:latest.release")
    rewrite "org.openrewrite.recipe:rewrite-migrate-java"
    rewrite "org.openrewrite.recipe:rewrite-static-analysis"
    rewrite "org.openrewrite.recipe:rewrite-third-party"

    constraints {
        checkstyle "com.puppycrawl.tools:checkstyle:$checkstyleVersion"
        checkstyle "com.github.sevntu-checkstyle:sevntu-checks:1.44.1"
    }

    checkerQual "org.checkerframework:checker-qual:4.2.0"
    checkerQual "org.checkerframework:dataflow-nullaway:4.2.0"
    checkerQual "org.checkerframework:dataflow-errorprone:4.2.0"
    checkerFramework "org.checkerframework:checker:4.2.0"
}

// owasp

dependencyCheck {
    autoUpdate = true

    // cveValidForHours = 24

    // let's ignore errors to make builds in Jenkins more stable
    failOnError = false
    // OWASP Dependency Check plugin for Jenkins needs an XML report,
    // but humans may also need an HTML one
    format = "ALL"

    // set up a quality gate for vulnerabilities with high severity level:
    // let's consider that a vulnerability has a high severity level if its CVSS score is higher than 7
    // the build is going to fail if vulnerabilities with high severity level found
    // failBuildOnCVSS = 7

    // specify a list of known issues which contain:
    // false-positives
    // confirmed vulnerabilities which are not fixed yet, but we have a ticket for that
    suppressionFile = "${rootDir}/.mifos/config/owasp/suppressions.xml"
}

// pmd

tasks.named("pmdMain") {
    source = sourceSets.main.allJava.matching {
        exclude "**/generated/**"
        exclude "**/build/generated/source/proto/**"
    }
}

tasks.named("pmdTest") {
    source = sourceSets.test.allJava.matching {
        exclude "**/generated/**"
        exclude "**/build/generated/source/proto/**"
    }
}

pmd {
    ignoreFailures = true
    consoleOutput = false
    toolVersion = "7.25.0"
    rulesMinimumPriority = 5
    ruleSets = ["category/java/errorprone.xml", "category/java/bestpractices.xml"]
    sourceSets = [sourceSets.main]
    // threads = 4
    pmdMain {
        excludes = [
            "**/bin/**",
            "**/out/**",
            "**/build/**",
            "**/target/**"
        ]
    }
}

// sonar

sonarqube {
    properties {
        property "sonar.sources", "src"
        property "sonar.sourceEncoding", "UTF-8"
        property "sonar.exclusions", "**/generated/**/*"
    }
}

// spotbugs

configurations.named("spotbugs").configure {
    resolutionStrategy.eachDependency {
        if (it.requested.group == 'org.ow2.asm') {
            it.useVersion "9.9.1"
            it.because "Asm 9.9.1 is required for JDK 25 support"
        }
    }
}

spotbugs {
    ignoreFailures = true
    showStackTraces = false
    showProgress = false
    // effort = Effort.DEFAULT
    // reportLevel = Confidence.DEFAULT
    visitors = ["FindSqlInjection", "SwitchFallthrough"]
    // omitVisitors = ["FindNonShortCircuit"]

    reportsDir = file("${projectDir}/build/reports/spotbugs")
    // includeFilter = "${rootDir}/.mifos/config/spotbugs/include.xml"
    excludeFilter = file("${rootDir}/.mifos/config/spotbugs/exclude.xml")

    // baselineFile = file("${rootDir}/.mifos/config/spotbugs/baseline.xml")
    // onlyAnalyze = ["org.mifos.*"]
    // maxHeapSize = "1g"
    // extraArgs = ["-nested:false"]
    // jvmArgs = ["-Duser.language=en"]
}

spotbugsMain {
    reports {
        sarif {
            enabled = true
        }
        html {
            enabled = true
            stylesheet = "fancy-hist.xsl"
        }
    }
}

spotbugsTest {
    reports {
        sarif {
            enabled = true
        }
        html {
            // TODO: make tests compilable again
            enabled = true
            stylesheet = "fancy-hist.xsl"
        }
    }
}

// spotless

spotless {
    enforceCheck = false // TODO: once we are ready enable this!

    encoding = "UTF-8"

    format "misc", {
        target "**/*.md", "**/*.properties", "**/gitignore.txt", "**/.openapi-generator-ignore", "**/*.yml", "**/*.xml", "**/**.json", "**/*.sql"
        targetExclude "**/build/**", "**/resources/template/**", "**/main/template/**", "**/bin/**", "**/.settings/**", "**/.idea/**", "**/.gradle/**", "**/gradlew.bat", "**/licenses/**", "**/banner.txt", ".vscode/**", ".profileconfig.json"
        leadingTabsToSpaces(4)
        endWithNewline()
        trimTrailingWhitespace()
    }

    java {
        target "src/*/java/**/*.java", "**/build/generated/sources/openapi/**/*.java"
        licenseHeaderFile rootProject.file(".mifos/config/licenses/license.java")
        targetExclude "**/build/**", "**/bin/**", "**/out/**"
        // importOrder() //sort imports alphabetically
        removeUnusedImports()
        // cleanthat()
        palantirJavaFormat()
                .formatJavadoc(true)
        formatAnnotations()
        endWithNewline()
        trimTrailingWhitespace()

        // Enforce style modifier order
//        custom "Modifier ordering", {
//            def modifierRanking = [
//                public      : 1,
//                protected   : 2,
//                private     : 3,
//                abstract    : 4,
//                default     : 5,
//                static      : 6,
//                final       : 7,
//                transient   : 8,
//                volatile    : 9,
//                synchronized: 10,
//                native      : 11,
//                strictfp    : 12
//            ]
//            // Find any instance of multiple modifiers. Lead with a non-word character to avoid
