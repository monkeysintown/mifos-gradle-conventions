plugins {
    id "org.mifos.convention.project.java.test"
}

dependencies {
    testImplementation "io.cucumber:cucumber-spring"
    testImplementation "org.springframework:spring-test"
    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testImplementation "org.springframework.boot:spring-boot-testcontainers"
    testImplementation "org.testcontainers:testcontainers-junit-jupiter"
    testImplementation "org.testcontainers:testcontainers-postgresql"
    testImplementation "org.testcontainers:testcontainers-localstack"
    testImplementation "org.testcontainers:testcontainers-mockserver"
    testImplementation "org.testcontainers:testcontainers-k3s"
    testImplementation "org.testcontainers:testcontainers-grafana"
    testImplementation "io.floci:testcontainers-floci"
    testImplementation "io.floci:spring-boot-testcontainers-floci"
    testImplementation "org.mock-server:mockserver-netty"
    testImplementation "org.mock-server:mockserver-junit-jupiter"
    testImplementation "org.mock-server:mockserver-spring-test-listener"
    testImplementation "digital.pragmatech.testing:spring-test-profiler"

    testImplementation "org.liquibase:liquibase-core"
    testImplementation "org.liquibase.ext:liquibase-postgresql"
    testImplementation "org.postgresql:postgresql"
    testImplementation "net.postgis:postgis-jdbc"
    testImplementation "net.postgis:postgis-jdbc-jts"
    testImplementation "net.postgis:postgis-jdbc-java2d"
    testImplementation "com.github.database-rider:rider-cucumber"
    testImplementation "com.github.database-rider:rider-core"
    testImplementation "com.github.database-rider:rider-spring"
    testImplementation "com.github.database-rider:rider-junit5"
    testCompileOnly "io.github.openfeign.querydsl:querydsl-sql-spring"
    testCompileOnly "io.github.openfeign.querydsl:querydsl-sql-spatial"
    testCompileOnly "io.github.openfeign.querydsl:querydsl-spatial"
    testCompileOnly "io.github.openfeign.querydsl:querydsl-collections"
    testAnnotationProcessor "com.infobip:infobip-spring-data-jdbc-annotation-processor"
    testAnnotationProcessor "io.github.openfeign.querydsl:querydsl-spatial"
}
