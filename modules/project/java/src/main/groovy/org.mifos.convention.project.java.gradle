plugins {
    id "org.mifos.convention.project.base.java"
    id "org.mifos.convention.project.java.test"
    id "org.mifos.convention.project.java.check"
    id "org.mifos.convention.project.java.dependencies"
    id "com.github.shalousun.smart-doc"
    // id "dev.sigstore.sign"
}

dependencies {
    implementation "org.slf4j:slf4j-api"
    implementation "org.slf4j:log4j-over-slf4j"
    implementation "org.slf4j:jcl-over-slf4j"
    implementation "org.slf4j:jul-to-slf4j"
    implementation "org.apache.logging.log4j:log4j-slf4j2-impl"
    implementation "ch.qos.logback:logback-core"
    implementation "ch.qos.logback:logback-classic"
    implementation "org.apache.commons:commons-lang3"
    implementation "commons-io:commons-io"
    implementation "com.ibm.icu:icu4j"
    implementation "jakarta.annotation:jakarta.annotation-api"
    implementation "com.github.therapi:therapi-runtime-javadoc"
    api "org.eclipse.collections:eclipse-collections-api"
    api "org.eclipse.collections:eclipse-collections"
    api "org.eclipse.collections:eclipse-collections-forkjoin"
    // asciidoc "org.asciidoctor:asciidoclet:3.0.0-SNAPSHOT"
    // asciidoc "org.asciidoctor:asciidoclet:2.0.0"
    compileOnly "com.google.code.findbugs:jsr305"
    compileOnly "org.projectlombok:lombok"
    compileOnly "com.google.errorprone:error_prone_annotations"
    compileOnly "org.immutables:value-annotations"
    compileOnly "org.immutables:serial"
    testCompileOnly "org.projectlombok:lombok"
    annotationProcessor "org.projectlombok:lombok"
    annotationProcessor "com.github.therapi:therapi-runtime-javadoc-scribe"
    annotationProcessor "org.immutables:value-processor"
    testAnnotationProcessor "org.projectlombok:lombok"
}
