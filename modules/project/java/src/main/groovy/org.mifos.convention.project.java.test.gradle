plugins {
    id "org.mifos.convention.project.base.java"
    id "test-report-aggregation"
    id "jvm-test-suite"
    id "jacoco"
    // id "jacoco-aggregation"
    id "se.thinkcode.cucumber-runner"
    id "com.arc-e-tect.gherkin-to-asciidoc"
}

/*
configurations {
    cucumberRuntime {
        extendsFrom testImplementation
        // description = "Cucumber Test Specifications"
    }
}
*/

test {
    useJUnitPlatform()

    jvmArgs "-Dmifos.environment=local"

    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    ignoreFailures = false

    reports {
        junitXml.required = true
        html.required = true
    }

    finalizedBy "jacocoTestReport"
}

jacoco {
    toolVersion = "0.8.14"
    // reportsDirectory = layout.buildDirectory.dir("reports/coverage")
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
    dependsOn test
}

