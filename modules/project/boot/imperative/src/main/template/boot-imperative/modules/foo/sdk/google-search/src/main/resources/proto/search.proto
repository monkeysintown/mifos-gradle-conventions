syntax = "proto2";

package tutorial;

option java_multiple_files = true;
option java_package = "org.mifos.dummy.sdk.google.search";
option java_outer_classname = "GoogleSearch";

message GooglePerson {
  optional string name = 1;
  optional int32 id = 2;
  optional string email = 3;

  enum GooglePhoneType {
    PHONE_TYPE_UNSPECIFIED = 0;
    PHONE_TYPE_MOBILE = 1;
    PHONE_TYPE_HOME = 2;
    PHONE_TYPE_WORK = 3;
  }

  message GooglePhoneNumber {
    optional string number = 1;
    optional GooglePhoneType type = 2 [default = PHONE_TYPE_HOME];
  }

  repeated GooglePhoneNumber phones = 4;
}

message GoogleAddressBook {
  repeated GooglePerson people = 1;
}