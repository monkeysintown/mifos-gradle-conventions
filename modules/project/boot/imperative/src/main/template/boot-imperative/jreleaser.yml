project:
  name: "mifos-dummy"
  version: "0.1.0-SNAPSHOT"
  license: "MPL-2.0"
  inceptionYear: "2026"
  vendor: "Mifos Initiative"
  copyright: "Copyright (c) 2026 Mifos Initiative"
  authors:
    - "Aleksandar Vidakovic"
  links:
    bugTracker: "https://mifosforge.jira.com"
    contribute: "https://mifos.org"
    documentation: "https://docs.mifos.org"
    donation: "https://mifos.org/take-action/donation-options"
    faq: "https://mifos.org/resources/support"
    contact: "https://mifos.org/about-us/contact-us"

signing:
  pgp:
    active: ALWAYS
    armored: true

catalog:
  sbom:
    syft:
      active: ALWAYS
  swid:
    mifos:
      active: ALWAYS

release:
  github:
    enabled: true
    owner: "openMf"
    tagName: v{{projectVersion}}
    overwrite: true
    commitAuthor:
      name: "Aleksandar Vidakovic"
      email: "aleks@mifos.org"

deploy:
  maven:
    artifactory:
      mifos:
        active: ALWAYS
        url: "https://mifos.jfrog.io/artifactory/mifosx-gradle-local"
        username: __USE_ENVIRONMENT_VARIABLE__
        password: __USE_ENVIRONMENT_VARIABLE__
        authorization: BEARER
        snapshotSupported: true
        applyMavenCentralRules: false
        stagingRepositories:
          - "modules/foo/build/staging-deploy"

