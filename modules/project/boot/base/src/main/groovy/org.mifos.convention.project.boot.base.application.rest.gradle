plugins {
    id "org.mifos.convention.project.boot.base.application"
    id "org.eclipse.jkube.kubernetes"
    id "org.eclipse.jkube.openshift"
}

dependencies {
    implementation "io.dekorate:kubernetes-spring-starter"
    // implementation "io.dekorate:kubernetes-annotations"
}

kubernetes {
    buildStrategy = "buildpacks"
    offline = false
    access {
        namespace = "default"
    }
    enricher {
        excludes = ["jkube-expose"]
    }
    generator {
        includes = ["spring-boot"]
        config {
            "spring-boot" {
                color = "always"
            }
        }
    }
    resources {
        controllerName = "test"
        configMap {
            name = "config-map-name"
            entries = [
                    [name: "test", value: "value"]
            ]
        }
    }
}

