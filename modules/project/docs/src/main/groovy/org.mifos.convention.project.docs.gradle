tasks.register("asciidocConfigCopy", Sync) {
    var destFile = file("${projectDir}/.asciidoctorconfig")
    onlyIf { !destFile.exists() }
    group = "documentation"
    description = "Copy the default Asciidoc editor configuration"

    copy {
        from "${rootDir}/.mifos/config/asciidoc/.asciidoctorconfig"
        into "${projectDir}/"
    }
}
