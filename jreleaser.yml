project:
  name: "mifos-conventions-gradle"
  license: "MPL-2.0"
  inceptionYear: "2026"
  vendor: "Mifos Initiative"
  copyright: "Copyright (c) 2026 Mifos Initiative"
  authors:
    - "Aleksandar Vidakovic"
  links:
    bugTracker: "https://mifos.org"
    contribute: "https://mifos.org"
    documentation: "https://mifos.org"
    donation: "https://mifos.org"
    faq: "https://mifos.org"
    contact: "https://mifos.org"

signing:
  pgp:
    active: ALWAYS
    armored: true

catalog:
  sbom:
    syft:
      active: ALWAYS
  swid:
    mifos:
      active: ALWAYS

# The 'maven' distribution type auto-discovers from a Maven repo layout
#distributions:
#  mifos-conventions-gradle:
