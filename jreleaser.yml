#    maven:
#      # JReleaser scans this directory for all Maven artifacts
#      directory: "build/staging-deploy"
#      # Auto-discovers groupId/artifactId/version from directory structure
#      auto: true

release:
  github:
    enabled: true
    # TODO: change this to openMf
    owner: "monkeysintown"
    tagName: v{{projectVersion}}
    overwrite: true
    commitAuthor:
      name: "Aleksandar Vidakovic"
      email: "aleks@mifos.org"

deploy:
  maven:
    artifactory:
      mifosx-gradle-local:
        active: ALWAYS
        url: "https://mifos.jfrog.io/artifactory/mifosx-gradle-local"
        snapshotSupported: true
        username: "MIFOS_JFROG_USERNAME"
        password: "MIFOS_JFROG_TOKEN"
        applyMavenCentralRules: false
        stagingRepository: "build/staging-deploy"

